name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/repositories
            .build/artifacts
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release

      - name: Smoke test - verify each mode starts
        run: |
          # Each mode should start, wait for MCP input on stdin, then exit on EOF
          # Exit code 0 or timeout (142) both indicate successful startup
          for mode in mail reminders calendar; do
            echo "Testing mode: $mode"
            timeout 3 .build/release/MacMCP $mode < /dev/null 2>&1 || true
          done
